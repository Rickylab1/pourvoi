<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PourToi — Ton feed, curé avec amour</title>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, doc, getDoc, setDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // =====================
  // FIREBASE CONFIG — remplace ces valeurs par les tiennes sur console.firebase.google.com
  // =====================
  const firebaseConfig = {
  apiKey: "AIzaSyAL6gIbaEafpOo7d9bFGsjrWwD5hdyrY0A",
  authDomain: "pourtoi-36400.firebaseapp.com",
  projectId: "pourtoi-36400",
  storageBucket: "pourtoi-36400.firebasestorage.app",
  messagingSenderId: "462689451982",
  appId: "1:462689451982:web:51d699e1bdfd86e9aef59f"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window._fb = { auth, db, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile, collection, addDoc, query, where, orderBy, onSnapshot, doc, getDoc, setDoc, getDocs, serverTimestamp };
  window.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --black: #0a0a0a;
    --white: #f5f0eb;
    --accent: #ff2d55;
    --accent2: #7000ff;
    --gray: #1a1a1a;
    --gray2: #2a2a2a;
    --text-muted: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== AUTH SCREEN ===== */
  #auth-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    position: relative;
  }

  #auth-screen::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(112,0,255,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255,45,85,0.12) 0%, transparent 50%);
    pointer-events: none;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 3rem;
    letter-spacing: -2px;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--white) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-sub {
    color: var(--text-muted);
    font-size: 0.9rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  .auth-card {
    background: var(--gray);
    border: 1px solid var(--gray2);
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%;
    max-width: 400px;
    position: relative;
    z-index: 1;
  }

  .auth-tabs {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .auth-tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 0.5rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .auth-tab.active {
    color: var(--white);
    border-bottom-color: var(--accent);
  }

  .form-group {
    margin-bottom: 1rem;
  }

  .form-group label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }

  .form-group input {
    width: 100%;
    background: var(--gray2);
    border: 1px solid #333;
    border-radius: 10px;
    padding: 0.85rem 1rem;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus { border-color: var(--accent2); }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 1rem;
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    margin-top: 1rem;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }

  .error-msg {
    color: var(--accent);
    font-size: 0.85rem;
    margin-top: 0.75rem;
    text-align: center;
    min-height: 1.2rem;
  }

  /* ===== MAIN APP ===== */
  #app-screen { display: none; }

  /* NAV */
  .top-nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--gray2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
    z-index: 100;
  }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    background: linear-gradient(135deg, var(--white), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .nav-username {
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .nav-actions { display: flex; gap: 0.75rem; align-items: center; }

  .icon-btn {
    background: var(--gray2);
    border: none;
    border-radius: 8px;
    padding: 0.5rem 0.85rem;
    color: var(--white);
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s;
    display: flex; align-items: center; gap: 0.4rem;
  }
  .icon-btn:hover { background: #333; }
  .icon-btn.active { background: var(--accent); }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 65px;
    background: rgba(10,10,10,0.97);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--gray2);
    display: flex;
    align-items: center;
    justify-content: space-around;
    z-index: 100;
  }

  .bnav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 0.65rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    padding: 0.5rem 1rem;
    border-radius: 10px;
    transition: color 0.2s;
  }

  .bnav-btn svg { width: 22px; height: 22px; }
  .bnav-btn.active { color: var(--white); }
  .bnav-btn.active .bnav-icon { color: var(--accent); }

  /* CONTENT AREA */
  .content-area {
    padding-top: 60px;
    padding-bottom: 65px;
    min-height: 100vh;
  }

  /* ===== FEED VIEW ===== */
  #feed-view {
    height: calc(100vh - 125px);
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
  }

  #feed-view::-webkit-scrollbar { display: none; }

  .feed-item {
    height: calc(100vh - 125px);
    scroll-snap-align: start;
    position: relative;
    display: flex;
    flex-direction: column;
    background: var(--black);
    overflow: hidden;
  }

  .feed-video-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    position: relative;
    overflow: hidden;
  }

  .feed-video-wrapper blockquote {
    max-width: 100%;
    max-height: 100%;
    width: 100% !important;
  }

  /* Overlay gradient */
  .feed-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    pointer-events: none;
  }

  .feed-info {
    position: absolute;
    bottom: 1.5rem;
    left: 1rem;
    right: 4rem;
    z-index: 5;
  }

  .feed-sender {
    font-size: 0.75rem;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 0.25rem;
    letter-spacing: 0.5px;
  }

  .feed-caption {
    font-size: 0.9rem;
    color: var(--white);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .feed-side-actions {
    position: absolute;
    bottom: 1.5rem;
    right: 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    align-items: center;
    z-index: 5;
  }

  .side-action {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-size: 0.65rem;
    color: var(--white);
  }

  .side-action-btn {
    width: 42px; height: 42px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(5px);
    border: none;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: white;
    transition: background 0.2s;
  }

  .side-action-btn:hover { background: rgba(255,255,255,0.25); }

  .empty-feed {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 1rem;
    color: var(--text-muted);
    text-align: center;
    padding: 2rem;
  }

  .empty-feed-icon { font-size: 4rem; }
  .empty-feed h3 { font-family: 'Syne', sans-serif; font-size: 1.3rem; color: var(--white); }

  /* ===== SEARCH / SEND VIEW ===== */
  #send-view { padding: 1.5rem; }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.6rem;
    margin-bottom: 1.5rem;
    letter-spacing: -0.5px;
  }

  .search-box {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .search-box input {
    flex: 1;
    background: var(--gray);
    border: 1px solid var(--gray2);
    border-radius: 12px;
    padding: 0.85rem 1rem;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: var(--accent2); }

  .btn-search {
    background: var(--accent2);
    border: none;
    border-radius: 12px;
    padding: 0 1.25rem;
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  .btn-search:hover { opacity: 0.85; }

  /* User search results */
  .user-list { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2rem; }

  .user-card {
    background: var(--gray);
    border: 1px solid var(--gray2);
    border-radius: 14px;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .user-card:hover, .user-card.selected { border-color: var(--accent2); background: rgba(112,0,255,0.08); }

  .user-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    margin-right: 0.85rem;
    flex-shrink: 0;
  }

  .user-name { font-weight: 500; font-size: 0.95rem; }
  .user-email { font-size: 0.75rem; color: var(--text-muted); }

  /* TikTok URL paste */
  .send-form {
    background: var(--gray);
    border: 1px solid var(--gray2);
    border-radius: 16px;
    padding: 1.5rem;
    display: none;
  }

  .send-form.visible { display: block; }

  .send-form h4 {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    margin-bottom: 0.5rem;
  }

  .send-form .selected-user-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(112,0,255,0.2);
    border: 1px solid var(--accent2);
    border-radius: 20px;
    padding: 0.3rem 0.75rem;
    font-size: 0.8rem;
    color: #bb88ff;
    margin-bottom: 1.25rem;
  }

  .url-input-group {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .url-input-group input, .url-input-group textarea {
    background: var(--gray2);
    border: 1px solid #333;
    border-radius: 10px;
    padding: 0.85rem 1rem;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    resize: none;
  }

  .url-input-group input:focus, .url-input-group textarea:focus { border-color: var(--accent2); }

  .btn-send {
    width: 100%;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    border: none;
    border-radius: 10px;
    padding: 1rem;
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.2s;
  }

  .btn-send:hover { opacity: 0.9; }

  .success-toast {
    position: fixed;
    bottom: 85px; left: 50%; transform: translateX(-50%);
    background: #1a1a1a;
    border: 1px solid #2ecc71;
    color: #2ecc71;
    padding: 0.75rem 1.5rem;
    border-radius: 50px;
    font-size: 0.9rem;
    font-weight: 500;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }

  .success-toast.show { opacity: 1; }

  /* ===== PROFILE VIEW ===== */
  #profile-view { padding: 2rem 1.5rem; }

  .profile-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 2rem;
    text-align: center;
  }

  .profile-avatar-big {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
  }

  .profile-username {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
  }

  .profile-email { color: var(--text-muted); font-size: 0.85rem; }

  .stats-row {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    flex: 1;
    background: var(--gray);
    border: 1px solid var(--gray2);
    border-radius: 14px;
    padding: 1.25rem;
    text-align: center;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.8rem;
    background: linear-gradient(135deg, var(--white), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }

  .btn-logout {
    width: 100%;
    background: var(--gray);
    border: 1px solid var(--gray2);
    border-radius: 10px;
    padding: 1rem;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }

  .btn-logout:hover { color: var(--accent); border-color: var(--accent); }

  /* Loading */
  .loading {
    display: flex; align-items: center; justify-content: center;
    min-height: 200px; color: var(--text-muted); font-size: 0.9rem;
  }

  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--gray2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 0.75rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* TikTok embed override */
  .tiktok-embed {
    max-width: 100% !important;
    min-width: unset !important;
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="logo">PourToi</div>
  <div class="logo-sub">Ton feed, curé avec amour</div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Connexion</button>
      <button class="auth-tab" onclick="switchTab('register')">Inscription</button>
    </div>

    <!-- LOGIN -->
    <div id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="ton@email.com">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="handleLogin()">Se connecter</button>
      <div class="error-msg" id="login-error"></div>
    </div>

    <!-- REGISTER -->
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>Pseudo</label>
        <input type="text" id="reg-username" placeholder="@tonpseudo">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="ton@email.com">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="reg-password" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="handleRegister()">Créer mon compte</button>
      <div class="error-msg" id="reg-error"></div>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <!-- Top nav -->
  <nav class="top-nav">
    <div class="nav-logo">PourToi</div>
    <div class="nav-username" id="nav-username"></div>
    <div class="nav-actions">
      <button class="icon-btn" onclick="showView('send')">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Envoyer
      </button>
    </div>
  </nav>

  <!-- Content -->
  <div class="content-area">

    <!-- FEED VIEW -->
    <div id="feed-view">
      <div class="loading"><div class="spinner"></div> Chargement…</div>
    </div>

    <!-- SEND VIEW -->
    <div id="send-view" style="display:none">
      <div class="section-title">Envoyer une vidéo 🎯</div>

      <!-- Step 1: search user -->
      <div class="search-box">
        <input type="text" id="user-search-input" placeholder="Rechercher un ami par pseudo..." oninput="searchUsers()">
      </div>

      <div id="user-list" class="user-list"></div>

      <!-- Step 2: paste TikTok link -->
      <div class="send-form" id="send-form">
        <h4>Vidéo à envoyer</h4>
        <div class="selected-user-badge" id="selected-user-badge">→ </div>
        <div class="url-input-group">
          <input type="url" id="tiktok-url" placeholder="Colle le lien TikTok ici...">
          <textarea id="send-caption" rows="2" placeholder="Ajoute un message (optionnel)"></textarea>
          <button class="btn-send" onclick="sendVideo()">
            ✦ Envoyer dans son feed
          </button>
        </div>
      </div>
    </div>

    <!-- PROFILE VIEW -->
    <div id="profile-view" style="display:none">
      <div class="profile-header">
        <div class="profile-avatar-big" id="profile-avatar">?</div>
        <div class="profile-username" id="profile-username">—</div>
        <div class="profile-email" id="profile-email">—</div>
      </div>
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num" id="stat-received">—</div>
          <div class="stat-label">Reçues</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-sent">—</div>
          <div class="stat-label">Envoyées</div>
        </div>
      </div>
      <button class="btn-logout" onclick="handleLogout()">Se déconnecter</button>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <button class="bnav-btn active" id="bnav-feed" onclick="showView('feed')">
      <svg class="bnav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      Feed
    </button>
    <button class="bnav-btn" id="bnav-send" onclick="showView('send')">
      <svg class="bnav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Envoyer
    </button>
    <button class="bnav-btn" id="bnav-profile" onclick="showView('profile')">
      <svg class="bnav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profil
    </button>
  </nav>
</div>

<!-- Toast -->
<div class="success-toast" id="toast"></div>

<script>
  let currentUser = null;
  let selectedUserId = null;
  let selectedUsername = null;
  let feedUnsubscribe = null;
  let statsUnsubscribeReceived = null;
  let statsUnsubscribeSent = null;
  let allUsers = [];

  // =====================
  // WAIT FOR FIREBASE
  // =====================
  window.addEventListener('firebase-ready', () => {
    const { auth, onAuthStateChanged } = window._fb;
    onAuthStateChanged(auth, user => {
      if (user) {
        currentUser = user;
        showApp();
      } else {
        currentUser = null;
        showAuth();
      }
    });
  });

  // =====================
  // AUTH HELPERS
  // =====================
  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  }

  async function handleLogin() {
    const { auth, signInWithEmailAndPassword } = window._fb;
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-password').value;
    document.getElementById('login-error').textContent = '';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      document.getElementById('login-error').textContent = 'Email ou mot de passe incorrect.';
    }
  }

  async function handleRegister() {
    const { auth, db, createUserWithEmailAndPassword, updateProfile, doc, setDoc } = window._fb;
    const username = document.getElementById('reg-username').value.trim().replace('@','');
    const email = document.getElementById('reg-email').value.trim();
    const pass = document.getElementById('reg-password').value;
    document.getElementById('reg-error').textContent = '';

    if (!username) { document.getElementById('reg-error').textContent = 'Pseudo requis.'; return; }
    if (username.length < 3) { document.getElementById('reg-error').textContent = 'Pseudo trop court (3 min).'; return; }

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: username });
      // Save user in Firestore for searchability
      await setDoc(doc(db, 'users', cred.user.uid), {
        uid: cred.user.uid,
        username: username.toLowerCase(),
        displayName: username,
        email: email,
        createdAt: new Date()
      });
    } catch(e) {
      if (e.code === 'auth/email-already-in-use') {
        document.getElementById('reg-error').textContent = 'Email déjà utilisé.';
      } else if (e.code === 'auth/weak-password') {
        document.getElementById('reg-error').textContent = 'Mot de passe trop faible (6 car. min).';
      } else {
        document.getElementById('reg-error').textContent = e.message;
      }
    }
  }

  async function handleLogout() {
    const { auth, signOut } = window._fb;
    if (feedUnsubscribe) feedUnsubscribe();
    await signOut(auth);
  }

  // =====================
  // SHOW AUTH / APP
  // =====================
  function showAuth() {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }

  function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('nav-username').textContent = '@' + (currentUser.displayName || 'user');
    showView('feed');
    loadFeed();
    loadStats();
  }

  // =====================
  // NAVIGATION
  // =====================
  function showView(view) {
    ['feed-view','send-view','profile-view'].forEach(v => {
      document.getElementById(v).style.display = 'none';
    });
    ['feed','send','profile'].forEach(b => {
      document.getElementById('bnav-'+b).classList.remove('active');
    });
    document.getElementById(view+'-view').style.display = 'block';
    document.getElementById('bnav-'+view).classList.add('active');

    if (view === 'profile') updateProfileView();
    if (view === 'send') document.getElementById('user-search-input').focus();
  }

  // =====================
  // FEED
  // =====================
  function loadFeed() {
    const { db, collection, query, where, orderBy, onSnapshot } = window._fb;
    const feedEl = document.getElementById('feed-view');

    if (feedUnsubscribe) feedUnsubscribe();

    const q = query(
      collection(db, 'videos'),
      where('recipientId', '==', currentUser.uid),
      orderBy('createdAt', 'desc')
    );

    feedUnsubscribe = onSnapshot(q, snapshot => {
      if (snapshot.empty) {
        feedEl.innerHTML = `
          <div class="feed-item">
            <div class="empty-feed">
              <div class="empty-feed-icon">🎬</div>
              <h3>Ton feed est vide</h3>
              <p style="color:var(--text-muted);font-size:0.9rem;max-width:260px">Demande à un ami de t'envoyer des vidéos via l'onglet Envoyer.</p>
            </div>
          </div>`;
        return;
      }

      feedEl.innerHTML = '';
      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        feedEl.appendChild(createFeedItem(data));
      });

      // Load TikTok embeds
      if (window.tiktokEmbedLoad) window.tiktokEmbedLoad();
    });
  }

  function createFeedItem(data) {
    const item = document.createElement('div');
    item.className = 'feed-item';

    // Extract TikTok video ID from URL
    const tiktokId = extractTikTokId(data.url);

    item.innerHTML = `
      <div class="feed-video-wrapper">
        ${tiktokId
          ? `<blockquote class="tiktok-embed" cite="${data.url}" data-video-id="${tiktokId}" style="max-width:605px;min-width:325px;">
               <section></section>
             </blockquote>`
          : `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);flex-direction:column;gap:1rem;">
               <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 2H3v16h5l4 4 4-4h5V2z"/></svg>
               <span style="font-size:0.85rem">Vidéo non disponible</span>
             </div>`
        }
        <div class="feed-overlay"></div>
        <div class="feed-info">
          <div class="feed-sender">✦ de ${data.senderName || 'Quelqu\'un'}</div>
          ${data.caption ? `<div class="feed-caption">${escapeHtml(data.caption)}</div>` : ''}
        </div>
        <div class="feed-side-actions">
          <div class="side-action">
            <button class="side-action-btn" onclick="window.open('${data.url}','_blank')">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </button>
            <span>Ouvrir</span>
          </div>
        </div>
      </div>`;

    return item;
  }

  function extractTikTokId(url) {
    if (!url) return null;
    const match = url.match(/\/video\/(\d+)/);
    return match ? match[1] : null;
  }

  // Reload TikTok embed script
  function reloadTikTokScript() {
    const old = document.querySelector('script[src*="tiktok"]');
    if (old) old.remove();
    const s = document.createElement('script');
    s.src = 'https://www.tiktok.com/embed.js';
    s.async = true;
    document.body.appendChild(s);
  }

  window.tiktokEmbedLoad = reloadTikTokScript;

  // Load on start
  setTimeout(reloadTikTokScript, 500);

  // =====================
  // SEARCH USERS
  // =====================
  let searchTimeout = null;
  async function searchUsers() {
    const q = document.getElementById('user-search-input').value.trim().toLowerCase();
    const listEl = document.getElementById('user-list');

    if (!q || q.length < 2) { listEl.innerHTML = ''; return; }

    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(async () => {
      const { db, collection, query, where, getDocs } = window._fb;

      listEl.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

      try {
        // Query by username prefix
        const qSnap = await getDocs(
          query(
            collection(db, 'users'),
            where('username', '>=', q),
            where('username', '<=', q + '\uf8ff')
          )
        );

        listEl.innerHTML = '';

        if (qSnap.empty) {
          listEl.innerHTML = '<div style="color:var(--text-muted);font-size:0.9rem;padding:1rem 0">Aucun utilisateur trouvé.</div>';
          return;
        }

        qSnap.forEach(docSnap => {
          const u = docSnap.data();
          if (u.uid === currentUser.uid) return; // skip self

          const card = document.createElement('div');
          card.className = 'user-card';
          card.dataset.uid = u.uid;
          card.dataset.name = u.displayName;
          card.innerHTML = `
            <div style="display:flex;align-items:center;gap:0.85rem">
              <div class="user-avatar">${u.displayName[0].toUpperCase()}</div>
              <div>
                <div class="user-name">@${u.displayName}</div>
                <div class="user-email">${u.email}</div>
              </div>
            </div>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`;

          card.onclick = () => selectUser(u.uid, u.displayName, card);
          listEl.appendChild(card);
        });
      } catch(e) {
        listEl.innerHTML = '<div style="color:var(--accent);font-size:0.85rem;padding:0.5rem 0">' + e.message + '</div>';
      }
    }, 300);
  }

  function selectUser(uid, name, cardEl) {
    document.querySelectorAll('.user-card').forEach(c => c.classList.remove('selected'));
    cardEl.classList.add('selected');
    selectedUserId = uid;
    selectedUsername = name;

    const form = document.getElementById('send-form');
    document.getElementById('selected-user-badge').textContent = '→ @' + name;
    form.classList.add('visible');

    // Scroll to form
    setTimeout(() => form.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }

  // =====================
  // SEND VIDEO
  // =====================
  async function sendVideo() {
    const { db, collection, addDoc, serverTimestamp } = window._fb;
    const url = document.getElementById('tiktok-url').value.trim();
    const caption = document.getElementById('send-caption').value.trim();

    if (!selectedUserId) { showToast('⚠️ Sélectionne un ami d\'abord.', false); return; }
    if (!url) { showToast('⚠️ Colle un lien TikTok.', false); return; }
    if (!url.includes('tiktok.com')) { showToast('⚠️ Ce n\'est pas un lien TikTok valide.', false); return; }

    try {
      await addDoc(collection(db, 'videos'), {
        url,
        caption,
        recipientId: selectedUserId,
        senderId: currentUser.uid,
        senderName: currentUser.displayName || 'Quelqu\'un',
        createdAt: serverTimestamp()
      });

      document.getElementById('tiktok-url').value = '';
      document.getElementById('send-caption').value = '';
      showToast('✦ Vidéo envoyée à @' + selectedUsername + ' !', true);
    } catch(e) {
      showToast('Erreur : ' + e.message, false);
    }
  }

  // =====================
  // STATS
  // =====================
  function loadStats() {
    const { db, collection, query, where, onSnapshot } = window._fb;

    // received
    const qR = query(collection(db, 'videos'), where('recipientId', '==', currentUser.uid));
    statsUnsubscribeReceived = onSnapshot(qR, s => {
      document.getElementById('stat-received').textContent = s.size;
    });

    // sent
    const qS = query(collection(db, 'videos'), where('senderId', '==', currentUser.uid));
    statsUnsubscribeSent = onSnapshot(qS, s => {
      document.getElementById('stat-sent').textContent = s.size;
    });
  }

  function updateProfileView() {
    const u = currentUser;
    document.getElementById('profile-avatar').textContent = (u.displayName || '?')[0].toUpperCase();
    document.getElementById('profile-username').textContent = '@' + (u.displayName || '—');
    document.getElementById('profile-email').textContent = u.email;
  }

  // =====================
  // TOAST
  // =====================
  function showToast(msg, success = true) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.borderColor = success ? '#2ecc71' : 'var(--accent)';
    t.style.color = success ? '#2ecc71' : 'var(--accent)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // =====================
  // UTILS
  // =====================
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>

</body>
</html>
