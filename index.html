<!DOCTYPE html>
<html lang="fr">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>PourToi</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, doc, setDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAL6gIbaEafpOs7d9bFGsjrWwO5hdyrY0A",
    authDomain: "pourtoi-36400.firebaseapp.com",
    projectId: "pourtoi-36400",
    storageBucket: "pourtoi-36400.firebasestorage.app",
    messagingSenderId: "462689451982",
    appId: "1:462689451982:web:51d699e1bdfd86e9aef59f"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  window._fb = { auth, db, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile, sendPasswordResetEmail, collection, addDoc, query, where, orderBy, onSnapshot, doc, setDoc, getDocs, serverTimestamp };
  window.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --black: #0a0a0a;
    --white: #f5f0eb;
    --accent: #ff2d55;
    --accent2: #7000ff;
    --gray: #1a1a1a;
    --gray2: #2a2a2a;
    --text-muted: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    height: 100%;
    width: 100%;
    overflow: hidden;
    position: fixed;
  }

  #auth-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; padding: 2rem; overflow-y: auto;
  }

  #auth-screen::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(112,0,255,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255,45,85,0.12) 0%, transparent 50%);
    pointer-events: none;
  }

  .logo {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 3rem; letter-spacing: -2px;
    background: linear-gradient(135deg, var(--white) 0%, var(--accent) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.3rem;
  }

  .logo-sub { color: var(--text-muted); font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 2.5rem; }

  .auth-card {
    background: var(--gray); border: 1px solid var(--gray2); border-radius: 20px;
    padding: 2rem; width: 100%; max-width: 380px; position: relative; z-index: 1;
  }

  .auth-tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; }

  .auth-tab {
    flex: 1; background: none; border: none; color: var(--text-muted);
    font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
    padding: 0.5rem; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s;
  }

  .auth-tab.active { color: var(--white); border-bottom-color: var(--accent); }

  .form-group { margin-bottom: 1rem; }

  .form-group label { display: block; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.4rem; }

  .form-group input {
    width: 100%; background: var(--gray2); border: 1px solid #333; border-radius: 10px;
    padding: 0.8rem 1rem; color: var(--white); font-family: 'DM Sans', sans-serif;
    font-size: 1rem; outline: none; transition: border-color 0.2s;
  }

  .form-group input:focus { border-color: var(--accent2); }

  .btn-primary {
    width: 100%; background: var(--accent); border: none; border-radius: 10px;
    padding: 1rem; color: white; font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 1rem; cursor: pointer; margin-top: 0.75rem;
  }

  .btn-primary:active { opacity: 0.8; }
  .error-msg { color: var(--accent); font-size: 0.82rem; margin-top: 0.6rem; text-align: center; min-height: 1.2rem; }

  #app-screen { display: none; height: 100vh; width: 100%; position: relative; }

  .top-nav {
    position: fixed; top: 0; left: 0; right: 0; height: 56px;
    background: rgba(10,10,10,0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.25rem; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .nav-logo {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem;
    background: linear-gradient(135deg, var(--white), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .icon-btn {
    background: var(--gray2); border: none; border-radius: 8px;
    padding: 0.45rem 0.8rem; color: var(--white); font-size: 0.8rem; cursor: pointer;
    display: flex; align-items: center; gap: 0.35rem; font-family: 'DM Sans', sans-serif;
  }

  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; height: 60px;
    background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: space-around; z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .bnav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; color: var(--text-muted);
    font-size: 0.6rem; font-family: 'DM Sans', sans-serif; cursor: pointer; padding: 0.4rem 1.2rem;
  }

  .bnav-btn svg { width: 22px; height: 22px; }
  .bnav-btn.active { color: var(--white); }

  .content-area { position: absolute; top: 56px; bottom: 60px; left: 0; right: 0; overflow: hidden; }

  /* FEED */
  #feed-view { height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
  #feed-view::-webkit-scrollbar { display: none; }

  .feed-item {
    height: 100%; scroll-snap-align: start; scroll-snap-stop: always;
    position: relative; background: #000; display: flex; align-items: center; justify-content: center;
  }

  .video-container {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #000; cursor: pointer;
  }

  .feed-overlay {
    position: absolute; bottom: 0; left: 0; right: 0; height: 40%;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    pointer-events: none; z-index: 2;
  }

  .play-btn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 80px; height: 80px;
    background: rgba(255,255,255,0.12); backdrop-filter: blur(8px);
    border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 3;
  }

  .play-btn:active { background: rgba(255,45,85,0.35); }

  .video-counter {
    position: absolute; top: 1rem; right: 1rem;
    background: rgba(0,0,0,0.45); border-radius: 50px;
    padding: 0.2rem 0.6rem; font-size: 0.68rem; color: rgba(255,255,255,0.45); z-index: 4;
  }

  .open-tiktok-btn {
    position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.1); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.18); border-radius: 50px;
    padding: 0.6rem 1.4rem; color: white;
    font-size: 0.8rem; font-family: 'Syne', sans-serif; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; gap: 0.5rem;
    white-space: nowrap; z-index: 4;
  }

  .empty-feed {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 1rem; text-align: center; padding: 2rem;
  }

  .empty-feed-icon { font-size: 4rem; }
  .empty-feed h3 { font-family: 'Syne', sans-serif; font-size: 1.3rem; }
  .empty-feed p { color: var(--text-muted); font-size: 0.88rem; max-width: 260px; line-height: 1.5; }

  /* SEND */
  #send-view { height: 100%; overflow-y: auto; padding: 1.5rem; -webkit-overflow-scrolling: touch; }
  #send-view::-webkit-scrollbar { display: none; }

  .section-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; margin-bottom: 1.25rem; }

  .search-box { display: flex; gap: 0.6rem; margin-bottom: 1.25rem; }

  .search-box input {
    flex: 1; background: var(--gray); border: 1px solid var(--gray2); border-radius: 12px;
    padding: 0.8rem 1rem; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none;
  }

  .search-box input:focus { border-color: var(--accent2); }

  .user-list { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.5rem; }

  .user-card {
    background: var(--gray); border: 1px solid var(--gray2); border-radius: 14px;
    padding: 0.9rem 1.1rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer;
  }

  .user-card.selected { border-color: var(--accent2); background: rgba(112,0,255,0.08); }

  .user-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.95rem;
    margin-right: 0.75rem; flex-shrink: 0;
  }

  .user-name { font-weight: 500; font-size: 0.92rem; }
  .user-email { font-size: 0.72rem; color: var(--text-muted); }

  .send-form { background: var(--gray); border: 1px solid var(--gray2); border-radius: 16px; padding: 1.25rem; display: none; }
  .send-form.visible { display: block; }
  .send-form h4 { font-family: 'Syne', sans-serif; font-size: 0.95rem; margin-bottom: 1rem; }

  .selected-user-badge {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: rgba(112,0,255,0.2); border: 1px solid var(--accent2);
    border-radius: 20px; padding: 0.25rem 0.7rem;
    font-size: 0.78rem; color: #bb88ff; margin-bottom: 1rem;
  }

  .url-input-group { display: flex; flex-direction: column; gap: 0.6rem; }

  .url-input-group input {
    background: var(--gray2); border: 1px solid #333; border-radius: 10px;
    padding: 0.8rem 1rem; color: var(--white); font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; outline: none; width: 100%;
  }

  .url-input-group input:focus { border-color: var(--accent2); }

  .btn-send {
    width: 100%; background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    border: none; border-radius: 10px; padding: 0.95rem; color: white;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; cursor: pointer; margin-top: 0.25rem;
  }

  /* PROFILE */
  #profile-view { height: 100%; overflow-y: auto; padding: 2rem 1.5rem; }

  .profile-header { display: flex; flex-direction: column; align-items: center; gap: 0.6rem; margin-bottom: 2rem; text-align: center; }

  .profile-avatar-big {
    width: 76px; height: 76px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem;
  }

  .profile-username { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; }
  .profile-email { color: var(--text-muted); font-size: 0.82rem; }

  .stats-row { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }

  .stat-card { flex: 1; background: var(--gray); border: 1px solid var(--gray2); border-radius: 14px; padding: 1.1rem; text-align: center; }

  .stat-num {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.7rem;
    background: linear-gradient(135deg, var(--white), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .stat-label { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.2rem; }

  .btn-logout {
    width: 100%; background: var(--gray); border: 1px solid var(--gray2); border-radius: 10px;
    padding: 0.95rem; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; cursor: pointer;
  }

  .btn-logout:active { color: var(--accent); border-color: var(--accent); }

  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #1a1a1a; border-radius: 50px; padding: 0.65rem 1.25rem;
    font-size: 0.85rem; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.3s;
    white-space: nowrap; pointer-events: none;
  }

  .toast.show { opacity: 1; }
  .toast.success { border: 1px solid #2ecc71; color: #2ecc71; }
  .toast.error { border: 1px solid var(--accent); color: var(--accent); }

  .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 0.88rem; gap: 0.6rem; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--gray2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="logo">PourToi</div>
  <div class="logo-sub">Ton feed, curé avec amour</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Connexion</button>
      <button class="auth-tab" onclick="switchTab('register')">Inscription</button>
    </div>
    <div id="login-form">
      <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="ton@email.com"></div>
      <div class="form-group"><label>Mot de passe</label><input type="password" id="login-password" placeholder="••••••••"></div>
      <button class="btn-primary" onclick="handleLogin()">Se connecter</button>
      <div class="error-msg" id="login-error"></div>
      <div style="text-align:center;margin-top:0.75rem">
        <button onclick="handleForgotPassword()" style="background:none;border:none;color:var(--text-muted);font-size:0.82rem;cursor:pointer;text-decoration:underline;font-family:'DM Sans',sans-serif;">Mot de passe oublié ?</button>
      </div>
    </div>
    <div id="register-form" style="display:none">
      <div class="form-group"><label>Pseudo</label><input type="text" id="reg-username" placeholder="@tonpseudo"></div>
      <div class="form-group"><label>Email</label><input type="email" id="reg-email" placeholder="ton@email.com"></div>
      <div class="form-group"><label>Mot de passe</label><input type="password" id="reg-password" placeholder="••••••••"></div>
      <button class="btn-primary" onclick="handleRegister()">Créer mon compte</button>
      <div class="error-msg" id="reg-error"></div>
    </div>
  </div>
</div>

<div id="app-screen">
  <nav class="top-nav">
    <div class="nav-logo">PourToi</div>
    <div id="nav-username" style="font-size:0.8rem;color:var(--text-muted)"></div>
    <button class="icon-btn" onclick="showView('send')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Envoyer
    </button>
  </nav>

  <div class="content-area">
    <div id="feed-view"><div class="loading"><div class="spinner"></div> Chargement…</div></div>

    <div id="send-view" style="display:none">
      <div class="section-title">Envoyer une vidéo 🎯</div>
      <div class="search-box">
        <input type="text" id="user-search-input" placeholder="Rechercher un ami par pseudo..." oninput="searchUsers()">
      </div>
      <div id="user-list" class="user-list"></div>
      <div class="send-form" id="send-form">
        <h4>Vidéo à envoyer</h4>
        <div class="selected-user-badge" id="selected-user-badge">→ </div>
        <div class="url-input-group">
          <input type="url" id="tiktok-url" placeholder="Colle le lien TikTok ici...">
          <button class="btn-send" onclick="sendVideo()">✦ Envoyer dans son feed</button>
        </div>
      </div>
    </div>

    <div id="profile-view" style="display:none">
      <div class="profile-header">
        <div class="profile-avatar-big" id="profile-avatar">?</div>
        <div class="profile-username" id="profile-username">—</div>
        <div class="profile-email" id="profile-email">—</div>
      </div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="stat-received">—</div><div class="stat-label">Reçues</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-sent">—</div><div class="stat-label">Envoyées</div></div>
      </div>
      <button class="btn-logout" onclick="handleLogout()">Se déconnecter</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="bnav-btn active" id="bnav-feed" onclick="showView('feed')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      Feed
    </button>
    <button class="bnav-btn" id="bnav-send" onclick="showView('send')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Envoyer
    </button>
    <button class="bnav-btn" id="bnav-profile" onclick="showView('profile')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profil
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
let currentUser = null, selectedUserId = null, selectedUsername = null, feedUnsubscribe = null;

window.addEventListener('firebase-ready', () => {
  const { auth, onAuthStateChanged } = window._fb;
  onAuthStateChanged(auth, user => {
    if (user) { currentUser = user; showApp(); }
    else { currentUser = null; showAuth(); }
  });
});

async function handleForgotPassword() {
  const { auth, sendPasswordResetEmail } = window._fb;
  const email = document.getElementById('login-email').value.trim();
  if (!email) { document.getElementById('login-error').textContent = 'Entre ton email d\'abord.'; return; }
  try {
    await sendPasswordResetEmail(auth, email);
    document.getElementById('login-error').style.color = '#2ecc71';
    document.getElementById('login-error').textContent = '✅ Email de réinitialisation envoyé !';
  } catch(e) {
    document.getElementById('login-error').style.color = 'var(--accent)';
    document.getElementById('login-error').textContent = 'Email introuvable.';
  }
}


  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('login-form').style.display = tab==='login'?'block':'none';
  document.getElementById('register-form').style.display = tab==='register'?'block':'none';
}

async function handleLogin() {
  const { auth, signInWithEmailAndPassword } = window._fb;
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  document.getElementById('login-error').textContent = '';
  try { await signInWithEmailAndPassword(auth, email, pass); }
  catch(e) { document.getElementById('login-error').textContent = 'Email ou mot de passe incorrect.'; }
}

async function handleRegister() {
  const { auth, db, createUserWithEmailAndPassword, updateProfile, doc, setDoc } = window._fb;
  const username = document.getElementById('reg-username').value.trim().replace('@','');
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-password').value;
  document.getElementById('reg-error').textContent = '';
  if (!username || username.length < 3) { document.getElementById('reg-error').textContent = 'Pseudo requis (3 car. min).'; return; }
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: username });
    await setDoc(doc(db,'users',cred.user.uid), { uid: cred.user.uid, username: username.toLowerCase(), displayName: username, email, createdAt: new Date() });
  } catch(e) {
    if (e.code==='auth/email-already-in-use') document.getElementById('reg-error').textContent = 'Email déjà utilisé.';
    else if (e.code==='auth/weak-password') document.getElementById('reg-error').textContent = 'Mot de passe trop faible (6 car. min).';
    else document.getElementById('reg-error').textContent = e.message;
  }
}

async function handleLogout() {
  if (feedUnsubscribe) feedUnsubscribe();
  await window._fb.signOut(window._fb.auth);
}

function showAuth() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('nav-username').textContent = '@'+(currentUser.displayName||'user');
  loadFeed(); loadStats(); showView('feed');
}

function showView(view) {
  ['feed','send','profile'].forEach(v => {
    document.getElementById(v+'-view').style.display = 'none';
    document.getElementById('bnav-'+v).classList.remove('active');
  });
  document.getElementById(view+'-view').style.display = 'block';
  document.getElementById('bnav-'+view).classList.add('active');
  if (view==='profile') updateProfileView();
}

function loadFeed() {
  const { db, collection, query, where, orderBy, onSnapshot } = window._fb;
  const feedEl = document.getElementById('feed-view');
  if (feedUnsubscribe) feedUnsubscribe();
  const q = query(collection(db,'videos'), where('recipientId','==',currentUser.uid), orderBy('createdAt','desc'));
  feedUnsubscribe = onSnapshot(q, snapshot => {
    if (snapshot.empty) {
      feedEl.innerHTML = `<div class="feed-item"><div class="empty-feed"><div class="empty-feed-icon">🎬</div><h3>Ton feed est vide</h3><p>Demande à un ami de t'envoyer des vidéos via l'onglet Envoyer.</p></div></div>`;
      return;
    }
    feedEl.innerHTML = '';
    const docs = [];
    snapshot.forEach(d => docs.push(d.data()));
    docs.forEach((data, i) => feedEl.appendChild(createFeedItem(data, i+1, docs.length)));
  });
}

function createFeedItem(data, index, total) {
  const item = document.createElement('div');
  item.className = 'feed-item';
  const url = (data.url||'').replace(/"/g,'&quot;');
  item.innerHTML = `
    <div class="video-container" onclick="openVideo('${url}')">
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d0010 0%,#10000a 100%);">
        <svg width="100" height="100" viewBox="0 0 24 24" fill="white" opacity="0.06"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/></svg>
      </div>
      <div class="play-btn">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </div>
      <div class="feed-overlay"></div>
      <div class="video-counter">${index} / ${total}</div>
      <button class="open-tiktok-btn" onclick="event.stopPropagation();openVideo('${url}')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/></svg>
        Regarder sur TikTok
      </button>
    </div>`;
  return item;
}

function openVideo(url) { if (url) window.open(url, '_blank'); }

let searchTimeout = null;
async function searchUsers() {
  const q = document.getElementById('user-search-input').value.trim().toLowerCase();
  const listEl = document.getElementById('user-list');
  if (!q || q.length < 2) { listEl.innerHTML = ''; return; }
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(async () => {
    const { db, collection, query, where, getDocs } = window._fb;
    listEl.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
      const qSnap = await getDocs(query(collection(db,'users'), where('username','>=',q), where('username','<=',q+'\uf8ff')));
      listEl.innerHTML = '';
      if (qSnap.empty) { listEl.innerHTML = '<div style="color:var(--text-muted);font-size:0.88rem;padding:0.75rem 0">Aucun utilisateur trouvé.</div>'; return; }
      qSnap.forEach(docSnap => {
        const u = docSnap.data();
        if (u.uid === currentUser.uid) return;
        const card = document.createElement('div');
        card.className = 'user-card';
        card.innerHTML = `<div style="display:flex;align-items:center;gap:0.75rem"><div class="user-avatar">${u.displayName[0].toUpperCase()}</div><div><div class="user-name">@${u.displayName}</div><div class="user-email">${u.email}</div></div></div><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`;
        card.onclick = () => selectUser(u.uid, u.displayName, card);
        listEl.appendChild(card);
      });
    } catch(e) { listEl.innerHTML = '<div style="color:var(--accent);font-size:0.82rem">'+e.message+'</div>'; }
  }, 300);
}

function selectUser(uid, name, cardEl) {
  document.querySelectorAll('.user-card').forEach(c => c.classList.remove('selected'));
  cardEl.classList.add('selected');
  selectedUserId = uid; selectedUsername = name;
  document.getElementById('selected-user-badge').textContent = '→ @'+name;
  const form = document.getElementById('send-form');
  form.classList.add('visible');
  setTimeout(() => form.scrollIntoView({ behavior:'smooth', block:'start' }), 100);
}

async function sendVideo() {
  const { db, collection, addDoc, serverTimestamp } = window._fb;
  const url = document.getElementById('tiktok-url').value.trim();
  if (!selectedUserId) { showToast('⚠️ Sélectionne un ami.', false); return; }
  if (!url || !url.includes('tiktok.com')) { showToast('⚠️ Lien TikTok invalide.', false); return; }
  try {
    await addDoc(collection(db,'videos'), {
      url, recipientId: selectedUserId,
      senderId: currentUser.uid,
      createdAt: serverTimestamp()
      // senderName omis volontairement — feed anonyme
    });
    document.getElementById('tiktok-url').value = '';
    showToast('✦ Vidéo envoyée !', true);
  } catch(e) { showToast('Erreur : '+e.message, false); }
}

function loadStats() {
  const { db, collection, query, where, onSnapshot } = window._fb;
  onSnapshot(query(collection(db,'videos'), where('recipientId','==',currentUser.uid)), s => { document.getElementById('stat-received').textContent = s.size; });
  onSnapshot(query(collection(db,'videos'), where('senderId','==',currentUser.uid)), s => { document.getElementById('stat-sent').textContent = s.size; });
}

function updateProfileView() {
  document.getElementById('profile-avatar').textContent = (currentUser.displayName||'?')[0].toUpperCase();
  document.getElementById('profile-username').textContent = '@'+(currentUser.displayName||'—');
  document.getElementById('profile-email').textContent = currentUser.email;
}

function showToast(msg, success=true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show '+(success?'success':'error');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
